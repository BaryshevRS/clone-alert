name: Badge

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: badge
  cancel-in-progress: false

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run badge
      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clone-alert-badge.json
          git diff --staged --quiet || git commit -m "chore: update duplication badge [skip ci]"
          git push
