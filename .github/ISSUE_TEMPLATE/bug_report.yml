name: Bug report
description: Something doesn't work, or clone-alert diverges from PMD CPD.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! clone-alert treats **PMD CPD as the etalon** — if
        the output differs from PMD on the same input, that's a bug. Please
        include enough to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
      placeholder: Expected X, got Y. If this differs from PMD CPD, say so.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command and, ideally, a minimal code snippet or repo.
      placeholder: |
        clone-alert --minimum-tokens 50 --files src
        # plus the smallest input that triggers it
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: clone-alert version
      description: Output of `npx clone-alert --version`.
      placeholder: "1.1.3"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v24.0.0"
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language / framework
      options:
        - TypeScript
        - JavaScript
        - JSX / TSX
        - Vue
        - Svelte
        - Angular
        - Other / multiple
    validations:
      required: true
